<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="Register.css">
  </head>
  <body>
    <h1>Account <span>Page</span></h1>

    <div class="card">
      <div class="card-label">Get started</div>
      <div class="card-title">Register</div>

      <form>
        <div class="field">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="your_username" />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <div class="field">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="••••••••" />
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">Register</button>
          <button type="reset" class="btn-ghost">Reset</button>
        </div>
      </form>

      <div class="divider"></div>
      <div class="card-footer">
        Already have an account? <a href="Login.html">Login</a>
      </div>
    </div>
  </body>
</html>
